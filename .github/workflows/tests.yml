name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  unit-tests:
    name: Unit tests (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...
